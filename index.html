<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conciliação Financeira</title>
  <link href="https://fonts.googleapis.com/css2?family=Questrial:wght@400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000; --surface: #111; --surface2: #1a1a1a; --border: #333; --border2: #444;
      --white: #fff; --muted: #999; --muted2: #666; --primary: #0ea5e9; --danger: #ef4444;
      --success: #10b981; --warning: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--white); font-family: 'Questrial', sans-serif; overflow-x: hidden; }
    .app { display: grid; grid-template-columns: 1fr; min-height: 100vh; gap: 0; }
    .header { background: var(--surface); padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 1.5rem; }
    .header .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }
    .main { padding: 40px; overflow-x: auto; }
    .btn { background: var(--primary); color: var(--white); border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { background: var(--muted2); cursor: not-allowed; transform: none; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--white); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface2); border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal h2 { margin-bottom: 16px; }
    .file-queue { margin: 16px 0; }
    .file-item { background: var(--surface); padding: 12px; border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .file-status { width: 12px; height: 12px; border-radius: 50%; }
    .file-status.wait { background: var(--muted); }
    .file-status.lendo { background: var(--warning); }
    .file-status.ok { background: var(--success); }
    .file-status.salvo { background: var(--primary); }
    .file-status.erro { background: var(--danger); }
    .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; color: var(--white); transform: translateX(100%); transition: transform 0.3s; z-index: 2000; }
    .toast.show { transform: translateX(0); }
    .toast.ok { background: var(--success); }
    .toast.erro { background: var(--danger); }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--surface2); font-weight: 500; }
    .status-ok { color: var(--success); }
    .status-wait { color: var(--warning); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <h1>🏦 Conciliação Financeira</h1>
        <div class="subtitle">Competência 02 · 2026</div>
      </div>
      <button class="btn" onclick="openModal()" id="btn-import">📎 Importar PDFs</button>
    </div>
    <div class="main">
      <table>
        <thead>
          <tr>
            <th>UF</th>
            <th>Valor</th>
            <th>Vencimento</th>
            <th>Pagamento</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="5" style="text-align:center;padding:40px;">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- MODAL IMPORT -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>📎 Importar Arquivos</h2>
      <input type="file" multiple accept=".pdf,.ofx,.zip" style="margin:16px 0;padding:8px;width:100%;" onchange="dropFiles(this.files)">
      <div class="file-queue" id="file-queue"></div>
      <div style="display:flex;gap:12px;margin-top:20px;">
        <button class="btn" style="background:var(--muted2);" onclick="closeModal()">Cancelar</button>
        <button class="btn" id="btn-process" onclick="processAll()">
          <span id="btn-process-text">Processar e Salvar</span>
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
// ── SUPABASE SETUP ────────────────────────────────────────────────────────────
const sb = supabase.createClient('https://oyjquympntpkuphkhugc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95anF1eW1wbnRwa3VwaGtodWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDcwNzkwMjcsImV4cCI6MjAyMjY1NTAyN30.sb_publishable_or4fFSeXN6hiqpMdLYwJHg_Jff5FwJ-');

let DATA = [];
let fileQueue = [];

// ── AUTH CHECK ─────────────────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    loadData();
  } else {
    window.location.href = 'https://guilhermesgb.github.io/Conciliacao_Financeira/';
  }
});

// ── SYSTEM LOCAL DE ANÁLISE ───────────────────────────────────────────────────
async function extractFromFile(file) {
  console.log('📄 Analisando arquivo:', file.name);
  
  const isOFX = file.name.toLowerCase().endsWith('.ofx');
  const isPDF = file.name.toLowerCase().endsWith('.pdf');
  const isZIP = file.name.toLowerCase().endsWith('.zip');
  
  if (isOFX) {
    return await processOFX(file);
  } else if (isPDF) {
    return await processPDF(file);
  } else if (isZIP) {
    return await processZIP(file);
  }
  
  throw new Error('Tipo de arquivo não suportado: ' + file.name);
}

async function processOFX(file) {
  const text = await file.text();
  const transacoes = [];
  const transactionRegex = /<STMTTRN>[\s\S]*?<\/STMTTRN>/g;
  let transaction;
  
  while ((transaction = transactionRegex.exec(text)) !== null) {
    const transText = transaction[0];
    
    const memoMatch = transText.match(/<MEMO>.*?"GNRE\s+([A-Z]{2})".*?<\/MEMO>/);
    const nameMatch = transText.match(/<n>([^<]*(?:GNRE|SEFAZ)[^<]*)<\/n>/);
    
    if (memoMatch || (nameMatch && nameMatch[1].toUpperCase().includes('GNRE'))) {
      const valorMatch = transText.match(/<TRNAMT>(-?\d+\.?\d*)<\/TRNAMT>/);
      const dataMatch = transText.match(/<DTPOSTED>(\d{8})<\/DTPOSTED>/);
      
      if (valorMatch && dataMatch) {
        let uf;
        if (memoMatch) {
          uf = memoMatch[1];
        } else {
          uf = extrairUF(nameMatch[1]);
        }
        
        const valor = Math.abs(parseFloat(valorMatch[1]));
        const data = formatarData(dataMatch[1]);
        
        transacoes.push({
          uf: uf,
          valor: valor,
          data_pagamento: data,
          descricao: 'Pagamento GNRE ' + uf
        });
      }
    }
  }
  
  return {
    tipo: 'extrato',
    transacoes: transacoes
  };
}

async function processPDF(file) {
  const filename = file.name.toLowerCase();
  const ufMatch = filename.match(/^([a-z]{2})(?:\s+fcp)?\.pdf$/);
  const uf = ufMatch ? ufMatch[1].toUpperCase() : 'XX';
  const isFCP = filename.includes('fcp');
  
  return {
    tipo: 'gnre',
    uf: uf,
    subtipo: isFCP ? 'FCP' : 'PRINCIPAL',
    competencia: '02/2026'
  };
}

async function processZIP(file) {
  if (!window.JSZip) {
    throw new Error('JSZip não carregada');
  }
  
  const zip = await JSZip.loadAsync(file);
  const gnres = [];
  
  for (const [nome, entry] of Object.entries(zip.files)) {
    if (!entry.dir && nome.toLowerCase().endsWith('.pdf')) {
      const ufMatch = nome.toLowerCase().match(/^([a-z]{2})(?:\s+fcp)?\.pdf$/);
      if (ufMatch) {
        gnres.push({
          uf: ufMatch[1].toUpperCase(),
          tipo: nome.toLowerCase().includes('fcp') ? 'FCP' : 'PRINCIPAL'
        });
      }
    }
  }
  
  return {
    tipo: 'zip_gnres',
    gnres: gnres
  };
}

function extrairUF(nome) {
  const upper = nome.toUpperCase();
  const patterns = {
    'PIAUI': 'PI', 'PERNAMBUCO': 'PE', 'PARANA': 'PR',
    'MATO GROSSO DO SUL': 'MS', 'SAO PAULO': 'SP'
  };
  
  for (const [estado, uf] of Object.entries(patterns)) {
    if (upper.includes(estado)) return uf;
  }
  
  const ufMatch = upper.match(/([A-Z]{2})/);
  return ufMatch ? ufMatch[1] : 'XX';
}

function formatarData(dateStr) {
  if (dateStr.length === 8) {
    const ano = dateStr.substr(0, 4);
    const mes = dateStr.substr(4, 2);
    const dia = dateStr.substr(6, 2);
    return dia + '/' + mes + '/' + ano;
  }
  return dateStr;
}

// ── SAVE TO SUPABASE ──────────────────────────────────────────────────────────
async function saveToSupabase(result) {
  console.log('💾 Salvando:', result.tipo);
  
  if (result.tipo === 'extrato') {
    for (const transacao of (result.transacoes || [])) {
      if (!transacao.uf) continue;
      
      const { data: existing } = await sb
        .from('gnre_conciliacao')
        .select('id')
        .eq('competencia', '02/2026')
        .eq('uf', transacao.uf)
        .maybeSingle();
      
      if (existing) {
        await sb.from('gnre_conciliacao').update({
          status: 'ok',
          data_pagto: transacao.data_pagamento,
          descricao: transacao.descricao,
          updated_at: new Date().toISOString()
        }).eq('id', existing.id);
      }
    }
  }
  
  if (result.tipo === 'gnre') {
    const uf = result.uf;
    if (!uf) return;
    
    const { data: existing } = await sb
      .from('gnre_conciliacao')
      .select('id')
      .eq('competencia', '02/2026')
      .eq('uf', uf)
      .maybeSingle();
    
    if (existing) {
      await sb.from('gnre_conciliacao').update({
        observacao: 'GNRE ' + uf + ' identificada',
        updated_at: new Date().toISOString()
      }).eq('id', existing.id);
    }
  }
}

// ── MODAL FUNCTIONS ───────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  fileQueue = [];
  renderQueue();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function dropFiles(files) {
  for (const file of files) {
    fileQueue.push({ file: file, status: 'wait' });
  }
  renderQueue();
}

function renderQueue() {
  const container = document.getElementById('file-queue');
  container.innerHTML = fileQueue.map(item => 
    '<div class="file-item">' +
      '<div class="file-status ' + item.status + '"></div>' +
      '<span>' + item.file.name + '</span>' +
    '</div>'
  ).join('');
}

async function processAll() {
  const btn = document.getElementById('btn-process');
  const btnText = document.getElementById('btn-process-text');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span> Processando…';
  
  for (const item of fileQueue) {
    if (item.status === 'salvo') continue;
    
    item.status = 'lendo';
    renderQueue();
    
    try {
      const result = await extractFromFile(item.file);
      item.status = 'ok';
      renderQueue();
      
      if (item.status === 'ok') {
        await saveToSupabase(result);
        item.status = 'salvo';
        renderQueue();
      }
    } catch(err) {
      console.error('Erro:', err);
      item.status = 'erro';
      renderQueue();
    }
  }
  
  btn.disabled = false;
  btnText.textContent = 'Processar e Salvar';
  
  showToast('✅ Processamento concluído');
  await loadData();
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ok show';
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData() {
  console.log('🔄 Carregando dados...');
  
  const { data, error } = await sb
    .from('gnre_conciliacao')
    .select('*')
    .eq('competencia', '02/2026');

  if (error) {
    console.error('Erro:', error);
    return;
  }

  renderTable(data);
}

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  
  if (!data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Nenhum registro encontrado</td></tr>';
    return;
  }
  
  tbody.innerHTML = data.map(r => 
    '<tr>' +
      '<td>' + r.uf + '</td>' +
      '<td>R$ ' + (parseFloat(r.valor) || 0).toFixed(2) + '</td>' +
      '<td>' + (r.vencimento || '—') + '</td>' +
      '<td>' + (r.data_pagto || '—') + '</td>' +
      '<td class="status-' + r.status + '">' + (r.status === 'ok' ? '✅ Pago' : '⏳ Pendente') + '</td>' +
    '</tr>'
  ).join('');
}

// ── REALTIME ──────────────────────────────────────────────────────────────────
sb.channel('gnre-changes')
  .on('postgres_changes', {
    event: '*',
    schema: 'public',
    table: 'gnre_conciliacao'
  }, () => {
    loadData();
  })
  .subscribe();

// ── INIT ──────────────────────────────────────────────────────────────────────
loadData();
</script>

</body>
</html>
